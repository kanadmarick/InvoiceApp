{% extends 'base.html' %}

{% block title %}Delete Invoice{% endblock %}

{% block content %}
    <h1>Are you sure you want to delete invoice "{{ invoice.invoice_number }}"?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'billings:invoice_detail' invoice.pk %}">No, cancel</a>
    </form>
{% endblock %}
