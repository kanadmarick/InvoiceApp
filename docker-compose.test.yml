# =============================================================
# Docker Compose Test Configuration
# Extends base docker-compose.yml for CI/CD testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up
# =============================================================

services:
  web:
    # Override the default web service command to run automated tests
    # 1. wait_for_db: Ensures PostgreSQL is ready before proceeding
    # 2. migrate: Applies database migrations
    # 3. test: Runs Django unit tests
    # 4. flake8: Lints Python code for style violations
    command: sh -c "python manage.py wait_for_db && python manage.py migrate && python manage.py test && flake8 ."
    
    # Remove env_file requirement - set all vars directly for CI/CD
    env_file: []
    
    # Test-specific environment variables
    # Provides all necessary config without requiring .env file
    environment:
      - DEBUG=False
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=testpassword123
      - SECRET_KEY=test-secret-key-for-ci-cd-only-not-for-production-use
      - ALLOWED_HOSTS=localhost,127.0.0.1
      
  db:
    # Remove persistent volume for tests - data will be ephemeral (stored in container)
    # This makes tests faster and data is automatically cleaned up when container stops
    volumes: []
    # Don't need to expose ports in CI/CD
    ports: []
    # Override database credentials for testing
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=testpassword123
