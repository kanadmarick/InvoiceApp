---
name: Checks

# Trigger this workflow on every push to any branch
on:
  push:

jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-22.04
    steps:
      # Step 1: Clone the repository code into the GitHub Actions runner
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Authenticate with DockerHub to avoid rate limits when pulling images
      # Requires DOCKER_USERNAME and DOCKER_PASSWORD secrets configured in GitHub repo settings
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Set up Docker Buildx for advanced build features
      # Buildx enables better caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build Docker images and run tests
      # Step 4: Create a .env file for the test environment
      # This file provides necessary environment variables for docker-compose.
      # In a CI environment, we use non-secret, test-specific values.
      - name: Create .env file
        run: |
          echo "SECRET_KEY=dummy-secret-key-for-ci-tests" >> .env
          echo "DEBUG=0" >> .env
          echo "DATABASE_URL=postgres://test_user:test_password@db:5432/test_db" >> .env
          echo "POSTGRES_DB=test_db" >> .env
          echo "POSTGRES_USER=test_user" >> .env
          echo "POSTGRES_PASSWORD=test_password" >> .env

      # Step 5: Build the 'web' service image with caching enabled.
      # This uses the GitHub Actions cache backend to store Docker layers.
      # Subsequent runs will be much faster as they can reuse unchanged layers.
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          # We tag the image with the name docker-compose expects ('<project>_<service>')
          # to ensure it's used in the next step.
          tags: invoices_web:latest
          # 'load: true' makes the image available to subsequent steps in the job.
          load: true
          # Use the GitHub Actions cache for layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6: Run tests using the pre-built, cached image.
      # docker-compose will find and use the 'invoices_web:latest' image.
      - name: Run tests
        run: |
          docker compose run --rm web sh -c "python manage.py wait_for_db && python manage.py migrate && python manage.py test && flake8 ."

      # Step 7: Clean up containers and volumes after the run.
      # The -v flag is crucial to remove the database volume, ensuring a clean slate for the next workflow run.
      - name: Clean up
        if: always()
        run: docker compose down -v --remove-orphans
