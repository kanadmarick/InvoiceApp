---
name: Checks

# Trigger this workflow on every push to any branch
on:
  push:

jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-22.04
    steps:
      # Step 1: Clone the repository code into the GitHub Actions runner
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Authenticate with DockerHub to avoid rate limits when pulling images
      # Requires DOCKER_USERNAME and DOCKER_PASSWORD secrets configured in GitHub repo settings
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Set up Docker Buildx for advanced build features
      # Buildx enables better caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Create a minimal .env file required by base docker-compose.yml parsing.
      # This prevents "env file .../.env not found" in CI for build/run/down commands.
      - name: Create CI .env
        run: |
          cat <<EOF > .env
          SECRET_KEY=ci-only-secret-key
          DEBUG=False
          DB_NAME=postgres
          DB_USER=postgres
          DB_PASSWORD=testpassword123
          DB_HOST=db
          DB_PORT=5432
          POSTGRES_DB=postgres
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=testpassword123
          ALLOWED_HOSTS=localhost,127.0.0.1
          EOF

      # Step 5: Build Docker images with the CI test override file.
      # This ensures test-specific env/settings are used in CI.
      - name: Build images
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml build --no-cache

      # Step 6: Run tests with the CI test override file.
      # This guarantees DB_HOST=db and skips local .env dependency.
      - name: Run tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm web sh -c "python manage.py wait_for_db && python manage.py migrate && python manage.py test && flake8 ."

      # Step 7: Clean up containers and volumes after the run.
      # The -v flag is crucial to remove the database volume, ensuring a clean slate for the next workflow run.
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v --remove-orphans
