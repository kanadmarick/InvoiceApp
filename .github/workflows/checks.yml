---
name: Checks

# Trigger this workflow on every push to any branch
on:
  push:

jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-22.04
    steps:
      # Step 1: Clone the repository code into the GitHub Actions runner
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Authenticate with DockerHub to avoid rate limits when pulling images
      # Requires DOCKER_USERNAME and DOCKER_PASSWORD secrets configured in GitHub repo settings
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Set up Docker Buildx for advanced build features
      # Buildx enables better caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build Docker images and run tests
      # - Builds fresh images without using cache (--no-cache ensures clean build)
      # - Uses both base and test docker-compose configurations
      # - Runs Django tests and flake8 linting inside the container
      - name: Build and Test
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml build --no-cache
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm web sh -c "python manage.py test && flake8 ."
            
