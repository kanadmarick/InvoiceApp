# =============================================================
# Docker Compose — PostgreSQL database service
# Replaces local Postgres install with a containerized instance
# Usage: docker compose up -d   (start)
#        docker compose down     (stop)
#        docker compose down -v  (stop + delete volume data)
# =============================================================

services:
  # Django web application service
  web:
    # Build the image from the Dockerfile in the current directory
    build:
      context: .
    # Friendly name for the container
    container_name: invoices_web
    # Auto-restart the container if it crashes or the host reboots
    restart: unless-stopped
    # Map container port 8000 to host port 8000
    ports:
      - "8000:8000"
    # Mount the current directory to /app in the container for development
    # This allows code changes to be reflected without rebuilding the image
    volumes:
      - .:/app
    # Load environment variables from .env (contains SECRET_KEY, DB credentials, etc.)
    env_file:
      - .env
    # Wait for the db service to be ready before starting the web service
    depends_on:
      db:
        condition: service_healthy

  # PostgreSQL 15 database container
  db:
    image: postgres:15                          # Official Postgres 15 image from Docker Hub
    container_name: invoices_db                 # Friendly name for docker ps / logs
    restart: unless-stopped                     # Auto-restart on crash or host reboot
    volumes:
      - postgres_data:/var/lib/postgresql/data/  # Persist data using a named volume
    # Postgres environment variables — read from .env values
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"                             # Map container port 5432 → host port 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

# Define the named volume used by the 'db' service
volumes:
  postgres_data:
