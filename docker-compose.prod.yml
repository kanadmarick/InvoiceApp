# =============================================================
# Docker Compose — Production (Oracle Cloud / Single VM)
# Runs Django + PostgreSQL + Nginx behind HTTPS
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   docker compose -f docker-compose.prod.yml --env-file .env.prod down
#   docker compose -f docker-compose.prod.yml --env-file .env.prod logs -f
# =============================================================

services:
  # ── Django API (Gunicorn) ───────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: invoices_web
    restart: unless-stopped
    # NOT exposed to host — only Nginx can reach it via the internal Docker network
    expose:
      - "8000"
    volumes:
      - media_data:/app/media          # Persist user-uploaded files (logos, etc.)
      - static_data:/app/staticfiles   # Shared with Nginx for static file serving
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-invoices}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-invoices}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:15-alpine          # Alpine variant = smaller image
    container_name: invoices_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-invoices}
      - POSTGRES_USER=${POSTGRES_USER:-invoices}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    # NOT exposed to host — only the web service connects via internal network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoices} -d ${POSTGRES_DB:-invoices}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── Nginx + React SPA ──────────────────────────────────────
  # Multi-stage build: Node.js builds React → Nginx serves it
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: invoices_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_data:/app/staticfiles:ro          # Serve Django static files
      - media_data:/app/media:ro                 # Serve user uploads
      - certbot_conf:/etc/letsencrypt:ro         # SSL certificates
      - certbot_www:/var/www/certbot:ro          # ACME challenge files
    depends_on:
      - web
    networks:
      - app_network

  # ── Certbot (SSL) ──────────────────────────────────────────
  # Step 1 — Obtain cert:
  #   docker compose -f docker-compose.prod.yml run --rm certbot \
  #     certonly --webroot -w /var/www/certbot -d yourdomain.com
  # Step 2 — Switch nginx to SSL config (see DEPLOYMENT_GUIDE.md)
  # Step 3 — Renew (runs in cron):
  #   docker compose -f docker-compose.prod.yml run --rm certbot renew
  certbot:
    image: certbot/certbot
    container_name: invoices_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:     # PostgreSQL data persistence
  media_data:        # User-uploaded files (logos, profile images)
  static_data:       # Django collectstatic output (admin, DRF, WhiteNoise)
  certbot_conf:      # Let's Encrypt SSL certificates
  certbot_www:       # ACME challenge files for cert renewal

# ── Network ───────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
